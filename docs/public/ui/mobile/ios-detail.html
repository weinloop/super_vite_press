<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS｜新闻详情（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .device-ios {
        width: 440px;
        height: 956px;
        border-radius: 54px;
        overflow: hidden;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black text-gray-900">
    <div class="min-h-screen flex items-center justify-center px-6 py-10">
      <div class="device-ios relative bg-gray-50">
        <!-- iOS 状态栏（必须包含） -->
        <header
          class="flex items-center justify-between px-6 text-white text-sm bg-black/85"
          style="height: 54px; padding-top: 18px; padding-bottom: 8px"
        >
          <span id="statusTime">9:41</span>
          <div class="flex items-center gap-1">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
          </div>
        </header>

        <div class="relative h-[calc(956px-54px)] flex flex-col">
          <!-- 顶部导航区 -->
          <div class="px-5 pt-4 pb-3 bg-white/80 backdrop-blur border-b border-gray-200">
            <div class="flex items-center justify-between">
              <button
                id="backBtn"
                class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
                aria-label="返回"
              >
                <i class="fa-solid fa-arrow-left"></i>
              </button>
              <div class="text-sm font-semibold text-gray-900">新闻详情</div>
              <button
                id="shareBtn"
                class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
                aria-label="分享"
                title="原型占位"
              >
                <i class="fa-solid fa-arrow-up-from-bracket"></i>
              </button>
            </div>
          </div>

          <!-- 内容区 -->
          <main class="flex-1 overflow-y-auto no-scrollbar bg-white">
            <div id="hero" class="relative h-56 bg-gray-200">
              <img id="heroImg" alt="" class="h-full w-full object-cover" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent"></div>
              <div class="absolute left-5 right-5 bottom-4">
                <div id="tag" class="inline-flex items-center gap-2 rounded-full bg-white/15 px-3 py-1 text-xs text-white backdrop-blur">
                  <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>
                  <span id="categoryLabel">个体新闻</span>
                </div>
              </div>
            </div>

            <div class="px-5 pt-5 pb-28">
              <h1 id="title" class="text-[18px] leading-7 font-semibold text-gray-900">
                —
              </h1>
              <div class="mt-3 flex flex-wrap items-center gap-2 text-xs text-gray-500">
                <span class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-3 py-1">
                  <i class="fa-regular fa-building"></i>
                  <span id="sourceName">—</span>
                </span>
                <span class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-3 py-1">
                  <i class="fa-regular fa-clock"></i>
                  <span id="publishTime">—</span>
                </span>
              </div>

              <div class="mt-5 rounded-3xl border border-gray-200 bg-gray-50 p-4">
                <div class="flex items-center justify-between">
                  <div class="font-semibold text-gray-900">摘要（Mock）</div>
                  <div class="text-xs text-gray-500">可截断 · 可扩展 AI 摘要（P2）</div>
                </div>
                <p id="summary" class="mt-3 text-sm leading-7 text-gray-700">
                  —
                </p>
              </div>

              <div class="mt-4 rounded-3xl border border-indigo-100 bg-indigo-50/70 p-4">
                <div class="flex items-start gap-3">
                  <div class="h-10 w-10 rounded-2xl bg-indigo-200/60 text-indigo-700 flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved"></i>
                  </div>
                  <div class="flex-1">
                    <div class="font-semibold text-indigo-900">合规说明</div>
                    <div class="mt-1 text-sm leading-7 text-indigo-900/80">
                      仅展示新闻标题、摘要与来源信息；点击“打开原文”将跳转至第三方站点查看完整内容。版权归原作者与来源站点所有。
                    </div>
                  </div>
                </div>
              </div>

              <div class="mt-5 text-xs text-gray-400">
                交互说明：返回将回到列表页当前分类（Mock）。
              </div>
            </div>
          </main>

          <!-- 底部操作区 -->
          <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-gray-200 px-5 pt-3 pb-8">
            <button
              id="openSourceBtn"
              class="w-full rounded-2xl bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-700 text-white font-semibold py-3"
            >
              打开原文
            </button>
            <div id="sourceHint" class="mt-2 text-center text-xs text-gray-500">
              将在新窗口打开（外链）
            </div>
          </div>

          <!-- Toast -->
          <div
            id="toast"
            class="pointer-events-none opacity-0 transition absolute left-1/2 -translate-x-1/2 top-28 rounded-full bg-gray-900 text-white text-xs px-4 py-2 shadow-xl"
          >
            已复制（Mock）
          </div>
        </div>
      </div>
    </div>

    <script>
      const covers = [
        "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80",
        "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80",
        "https://images.unsplash.com/photo-1557683316-973673baf926?w=1200&q=80",
        "https://images.unsplash.com/photo-1518779578993-ec3579fee39f?w=900&q=80",
        "https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=900&q=80",
        "https://images.unsplash.com/photo-1553877522-43269d4ea984?w=900&q=80",
        "https://images.unsplash.com/photo-1554774853-b414d539f13d?w=900&q=80",
        "https://images.unsplash.com/photo-1556761175-4b46a572b786?w=900&q=80",
      ];

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatTime(ts) {
        const d = new Date(ts);
        return `${d.getMonth() + 1}月${d.getDate()}日 ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function genMockNews(category) {
        const baseSources =
          category === "ai"
            ? [
                { name: "OpenAI Blog", url: "https://openai.com/blog" },
                { name: "Google AI", url: "https://ai.google/" },
                { name: "Hugging Face", url: "https://huggingface.co/blog" },
                { name: "The Verge", url: "https://www.theverge.com/ai-artificial-intelligence" },
                { name: "MIT Tech Review", url: "https://www.technologyreview.com/" },
              ]
            : [
                { name: "Indie Hackers", url: "https://www.indiehackers.com/" },
                { name: "Product Hunt", url: "https://www.producthunt.com/" },
                { name: "Hacker News", url: "https://news.ycombinator.com/" },
                { name: "Lenny’s Newsletter", url: "https://www.lennysnewsletter.com/" },
                { name: "Stripe", url: "https://stripe.com/" },
              ];

        const titleSeeds =
          category === "ai"
            ? [
                "多模态模型如何改变个人工作流",
                "开源推理加速：把延迟从 2s 降到 400ms",
                "AI 产品增长：从体验到留存的 7 个关键点",
                "政策更新：AI 合规与数据治理的最新动向",
                "工具链升级：把提示工程变成可复用资产",
              ]
            : [
                "独立开发者如何在 30 天做出可售卖产品",
                "从 0 到 1：个人品牌与内容分发的组合拳",
                "小团队增长：把用户反馈变成迭代节奏",
                "副业转正：如何找到第一个稳定的付费用户",
                "产品冷启动：用最小闭环验证需求",
              ];

        const summarySeeds =
          category === "ai"
            ? [
                "围绕“可落地”的使用场景展开，强调可观察指标与迭代回路，避免只堆模型能力。并给出从评测到上线监控的关键检查点。",
                "从数据、评测、推理到上线监控给出全链路要点，并补充常见坑位与规避方案。适合想把 AI 真正用起来的独立团队。",
                "以真实团队案例拆解：需求澄清、产研协作、以及把模型融入体验的关键触点，并讨论合规与风险边界。",
              ]
            : [
                "从市场与用户心智入手，强调先卖后做与快速验证，减少无效开发。给出可执行的分发与定价策略参考。",
                "拆解获客渠道、定价与交付方式，给出可复用的执行清单与节奏建议，让个人在有限时间里稳定推进。",
                "聚焦最小可行闭环：问题-方案-验证-复购，帮助个人保持长期迭代，并将反馈纳入每周节奏。",
              ];

        const now = Date.now();
        const items = [];
        for (let i = 0; i < 60; i++) {
          const source = baseSources[i % baseSources.length];
          const title = titleSeeds[i % titleSeeds.length] + `（第 ${i + 1} 条）`;
          const summary = summarySeeds[i % summarySeeds.length];
          const publishTime = now - (i * 37 + (category === "ai" ? 11 : 7)) * 60 * 1000;
          const id = `${category}-${i + 1}`;
          items.push({
            id,
            category,
            title,
            summary,
            sourceName: source.name,
            sourceUrl: source.url,
            publishTime,
            coverUrl: covers[i % covers.length],
          });
        }
        return items;
      }

      const dataset = {
        individual: genMockNews("individual"),
        ai: genMockNews("ai"),
      };

      const els = {
        statusTime: document.getElementById("statusTime"),
        backBtn: document.getElementById("backBtn"),
        shareBtn: document.getElementById("shareBtn"),
        toast: document.getElementById("toast"),
        heroImg: document.getElementById("heroImg"),
        categoryLabel: document.getElementById("categoryLabel"),
        title: document.getElementById("title"),
        sourceName: document.getElementById("sourceName"),
        publishTime: document.getElementById("publishTime"),
        summary: document.getElementById("summary"),
        openSourceBtn: document.getElementById("openSourceBtn"),
        sourceHint: document.getElementById("sourceHint"),
      };

      function setStatusClock() {
        const now = new Date();
        els.statusTime.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
      }

      function showToast(text) {
        els.toast.textContent = text;
        els.toast.classList.remove("opacity-0");
        els.toast.classList.add("opacity-100");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => {
          els.toast.classList.add("opacity-0");
          els.toast.classList.remove("opacity-100");
        }, 900);
      }

      function init() {
        const u = new URL(window.location.href);
        const id = u.searchParams.get("id") || "individual-1";
        const category = u.searchParams.get("category") === "ai" ? "ai" : "individual";
        const item = dataset[category].find((x) => x.id === id) || dataset[category][0];

        els.categoryLabel.textContent = category === "ai" ? "AI 新闻" : "个体新闻";
        els.heroImg.src = item.coverUrl;
        els.title.textContent = item.title;
        els.sourceName.textContent = item.sourceName;
        els.publishTime.textContent = formatTime(item.publishTime);
        els.summary.textContent = item.summary;

        els.backBtn.addEventListener("click", () => {
          window.location.href = `./ios.html?category=${encodeURIComponent(category)}`;
        });

        els.shareBtn.addEventListener("click", async () => {
          const text = `${item.title}（来源：${item.sourceName}）`;
          try {
            if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
            showToast("已复制（Mock）");
          } catch {
            showToast("复制失败（Mock）");
          }
        });

        els.openSourceBtn.addEventListener("click", () => {
          window.open(item.sourceUrl, "_blank", "noopener,noreferrer");
        });

        els.sourceHint.textContent = `来源：${item.sourceName} · 将在新窗口打开`;
      }

      setStatusClock();
      window.setInterval(setStatusClock, 15000);
      init();
    </script>
  </body>
</html>
