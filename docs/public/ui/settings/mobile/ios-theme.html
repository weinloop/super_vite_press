<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS｜主题/显示（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      .device-ios { width: 440px; height: 956px; border-radius: 54px; overflow: hidden; box-shadow: 0 25px 80px rgba(0,0,0,0.2); }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black text-gray-900">
    <div class="min-h-screen flex items-center justify-center px-6 py-10">
      <div class="device-ios relative bg-gray-50">
        <header class="flex items-center justify-between px-6 text-white text-sm bg-black/85" style="height: 54px; padding-top: 18px; padding-bottom: 8px">
          <span>9:41</span>
          <div class="flex items-center gap-1"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
        </header>
        <div class="relative h-[calc(956px-54px)]">
          <div class="px-5 pt-4 pb-3 bg-white/80 backdrop-blur border-b border-gray-200">
            <div class="flex items-center justify-between">
              <a href="./ios.html" class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-arrow-left"></i></a>
              <div class="text-lg font-semibold text-gray-900">主题/显示</div>
              <div class="w-10"></div>
            </div>
          </div>
          <main class="overflow-y-auto px-5 pt-6 pb-28 space-y-6">
            <div class="rounded-2xl bg-white border border-gray-100 overflow-hidden">
              <div class="px-4 py-3 text-sm font-medium text-gray-500 border-b border-gray-100">主题</div>
              <label class="flex items-center justify-between px-4 py-4 cursor-pointer">
                <span class="font-medium text-gray-900">跟随系统</span>
                <input type="radio" name="theme" checked class="w-5 h-5 text-indigo-600" />
              </label>
              <label class="flex items-center justify-between px-4 py-4 cursor-pointer border-t border-gray-100">
                <span class="font-medium text-gray-900">浅色</span>
                <input type="radio" name="theme" class="w-5 h-5 text-indigo-600" />
              </label>
              <label class="flex items-center justify-between px-4 py-4 cursor-pointer border-t border-gray-100">
                <span class="font-medium text-gray-900">深色</span>
                <input type="radio" name="theme" class="w-5 h-5 text-indigo-600" />
              </label>
            </div>
            <div class="rounded-2xl bg-white border border-gray-100 overflow-hidden">
              <div class="px-4 py-3 text-sm font-medium text-gray-500 border-b border-gray-100">字体大小</div>
              <div class="flex gap-2 p-4">
                <button class="flex-1 rounded-xl border-2 border-gray-200 py-2 text-sm font-medium text-gray-600">小</button>
                <button class="flex-1 rounded-xl border-2 border-indigo-500 bg-indigo-50 py-2 text-sm font-medium text-indigo-700">中</button>
                <button class="flex-1 rounded-xl border-2 border-gray-200 py-2 text-sm font-medium text-gray-600">大</button>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
