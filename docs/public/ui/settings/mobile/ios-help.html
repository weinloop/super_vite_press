<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS｜帮助/FAQ（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      .device-ios { width: 440px; height: 956px; border-radius: 54px; overflow: hidden; box-shadow: 0 25px 80px rgba(0,0,0,0.2); }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black text-gray-900">
    <div class="min-h-screen flex items-center justify-center px-6 py-10">
      <div class="device-ios relative bg-gray-50">
        <header class="flex items-center justify-between px-6 text-white text-sm bg-black/85" style="height: 54px; padding-top: 18px; padding-bottom: 8px">
          <span>9:41</span>
          <div class="flex items-center gap-1"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
        </header>
        <div class="relative h-[calc(956px-54px)]">
          <div class="px-5 pt-4 pb-3 bg-white/80 backdrop-blur border-b border-gray-200">
            <div class="flex items-center justify-between">
              <a href="./ios.html" class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-arrow-left"></i></a>
              <div class="text-lg font-semibold text-gray-900">帮助/FAQ</div>
              <div class="w-10"></div>
            </div>
          </div>
          <main class="overflow-y-auto px-5 pt-6 pb-28">
            <div class="space-y-2">
              <details class="rounded-2xl bg-white border border-gray-100 overflow-hidden group">
                <summary class="px-4 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between">
                  如何看新闻？
                  <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
                </summary>
                <div class="px-4 pb-4 text-sm text-gray-600 leading-6">进入新闻首页后，可通过顶部 Tab 切换「个体新闻」与「AI 新闻」。点击列表项进入详情，再点击「打开原文」跳转至来源站点。支持下拉刷新与加载更多。</div>
              </details>
              <details class="rounded-2xl bg-white border border-gray-100 overflow-hidden group">
                <summary class="px-4 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between">
                  如何用教程？
                  <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
                </summary>
                <div class="px-4 pb-4 text-sm text-gray-600 leading-6">教程按阶段（入门/进阶/变现）与主题组织。先选择当前阶段，再用主题筛选缩小范围。点击教程卡片进入详情，自产/转载内容可直接阅读，外链类型需点击「打开外链」。</div>
              </details>
              <details class="rounded-2xl bg-white border border-gray-100 overflow-hidden group">
                <summary class="px-4 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between">
                  如何反馈？
                  <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
                </summary>
                <div class="px-4 pb-4 text-sm text-gray-600 leading-6">在设置页点击「反馈」，填写类型、问题描述与联系方式后提交。也可通过邮件 feedback@superoneman.local 联系我们。</div>
              </details>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
