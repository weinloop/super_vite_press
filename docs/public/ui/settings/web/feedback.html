<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web｜反馈（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 flex flex-col">
    <nav class="flex items-center justify-between px-6 md:px-10 py-4 bg-white border-b border-gray-200">
      <div class="flex items-center gap-4">
        <a href="./desktop.html" class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="text-lg font-semibold text-gray-900">反馈</div>
      </div>
      <a href="../../index.html" class="text-sm text-gray-500 hover:text-gray-700">返回入口</a>
    </nav>
    <main class="flex-1 px-6 md:px-10 py-8 max-w-2xl">
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">类型（可选）</label>
          <select class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-gray-900 bg-white">
            <option>建议</option>
            <option>BUG</option>
            <option>其他</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">问题描述（必填）</label>
          <textarea class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-gray-900 bg-white min-h-[140px] resize-none" placeholder="请描述您的问题或建议..."></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">联系方式（可选）</label>
          <input type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-gray-900 bg-white" placeholder="邮箱或手机，便于我们回复" />
        </div>
        <button type="button" class="w-full rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3">
          提交
        </button>
        <p class="text-sm text-gray-500 text-center">提交后展示成功提示（Mock）</p>
      </form>
    </main>
  </body>
</html>
