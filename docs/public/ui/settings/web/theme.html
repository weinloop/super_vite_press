<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web｜主题/显示（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 flex flex-col">
    <nav class="flex items-center justify-between px-6 md:px-10 py-4 bg-white border-b border-gray-200">
      <div class="flex items-center gap-4">
        <a href="./desktop.html" class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="text-lg font-semibold text-gray-900">主题/显示</div>
      </div>
      <a href="../../index.html" class="text-sm text-gray-500 hover:text-gray-700">返回入口</a>
    </nav>
    <main class="flex-1 px-6 md:px-10 py-8 max-w-2xl space-y-6">
      <div class="rounded-2xl bg-white border border-gray-200 overflow-hidden">
        <div class="px-6 py-3 text-sm font-medium text-gray-500 border-b border-gray-100">主题</div>
        <div class="p-4 space-y-2">
          <label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-gray-50">
            <input type="radio" name="theme" checked class="w-5 h-5 text-indigo-600" />
            <span class="font-medium text-gray-900">跟随系统</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-gray-50">
            <input type="radio" name="theme" class="w-5 h-5 text-indigo-600" />
            <span class="font-medium text-gray-900">浅色</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer p-3 rounded-xl hover:bg-gray-50">
            <input type="radio" name="theme" class="w-5 h-5 text-indigo-600" />
            <span class="font-medium text-gray-900">深色</span>
          </label>
        </div>
      </div>
      <div class="rounded-2xl bg-white border border-gray-200 overflow-hidden">
        <div class="px-6 py-3 text-sm font-medium text-gray-500 border-b border-gray-100">字体大小</div>
        <div class="flex gap-3 p-4">
          <button class="flex-1 rounded-xl border-2 border-gray-200 py-3 text-sm font-medium text-gray-600 hover:border-gray-300">小</button>
          <button class="flex-1 rounded-xl border-2 border-indigo-500 bg-indigo-50 py-3 text-sm font-medium text-indigo-700">中</button>
          <button class="flex-1 rounded-xl border-2 border-gray-200 py-3 text-sm font-medium text-gray-600 hover:border-gray-300">大</button>
        </div>
      </div>
    </main>
  </body>
</html>
