<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web｜帮助/FAQ（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 flex flex-col">
    <nav class="flex items-center justify-between px-6 md:px-10 py-4 bg-white border-b border-gray-200">
      <div class="flex items-center gap-4">
        <a href="./desktop.html" class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-700"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="text-lg font-semibold text-gray-900">帮助/FAQ</div>
      </div>
      <a href="../../index.html" class="text-sm text-gray-500 hover:text-gray-700">返回入口</a>
    </nav>
    <main class="flex-1 px-6 md:px-10 py-8 max-w-2xl">
      <div class="space-y-3">
        <details class="rounded-2xl bg-white border border-gray-200 overflow-hidden group">
          <summary class="px-6 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between hover:bg-gray-50">
            如何看新闻？
            <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
          </summary>
          <div class="px-6 pb-4 text-sm text-gray-600 leading-7 border-t border-gray-100 pt-2">进入新闻首页后，可通过顶部 Tab 切换「个体新闻」与「AI 新闻」。点击列表项进入详情，再点击「打开原文」跳转至来源站点。支持下拉刷新与加载更多。</div>
        </details>
        <details class="rounded-2xl bg-white border border-gray-200 overflow-hidden group">
          <summary class="px-6 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between hover:bg-gray-50">
            如何用教程？
            <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
          </summary>
          <div class="px-6 pb-4 text-sm text-gray-600 leading-7 border-t border-gray-100 pt-2">教程按阶段（入门/进阶/变现）与主题组织。先选择当前阶段，再用主题筛选缩小范围。点击教程卡片进入详情，自产/转载内容可直接阅读，外链类型需点击「打开外链」。</div>
        </details>
        <details class="rounded-2xl bg-white border border-gray-200 overflow-hidden group">
          <summary class="px-6 py-4 font-medium text-gray-900 cursor-pointer flex items-center justify-between hover:bg-gray-50">
            如何反馈？
            <i class="fa-solid fa-chevron-down text-gray-400 group-open:rotate-180 transition"></i>
          </summary>
          <div class="px-6 pb-4 text-sm text-gray-600 leading-7 border-t border-gray-100 pt-2">在设置页点击「反馈」，填写类型、问题描述与联系方式后提交。也可通过邮件 feedback@superoneman.local 联系我们。</div>
        </details>
      </div>
    </main>
  </body>
</html>
