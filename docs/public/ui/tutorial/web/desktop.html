<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web｜如何成为超级个体（教程 Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black text-gray-900 flex flex-col">
    <!-- 顶部导航 -->
    <nav class="flex items-center justify-between px-6 md:px-10 py-4 bg-white/95 border-b border-gray-200">
      <div class="flex items-center gap-4">
        <a href="../../index.html" class="flex items-center gap-3">
          <div
            class="h-10 w-10 rounded-2xl bg-gradient-to-br from-sky-500 via-cyan-500 to-emerald-500"
          ></div>
          <div>
            <div class="text-xs text-gray-500">REQ-018-002 · P1</div>
            <div class="text-lg font-semibold tracking-tight text-gray-900">如何成为超级个体</div>
          </div>
        </a>
        <!-- 阶段步骤条 -->
        <div class="hidden md:flex items-center gap-3 text-sm ml-4">
          <button id="stageIntro" class="flex items-center gap-2">
            <span class="h-7 w-7 rounded-full border flex items-center justify-center text-xs">1</span>
            <span>入门</span>
          </button>
          <span class="h-px w-8 bg-gray-300"></span>
          <button id="stageAdvanced" class="flex items-center gap-2">
            <span class="h-7 w-7 rounded-full border flex items-center justify-center text-xs">2</span>
            <span>进阶</span>
          </button>
          <span class="h-px w-8 bg-gray-300"></span>
          <button id="stageMonetize" class="flex items-center gap-2">
            <span class="h-7 w-7 rounded-full border flex items-center justify-center text-xs">3</span>
            <span>变现</span>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden lg:flex items-center gap-2 rounded-2xl bg-gray-100 px-4 py-2 text-sm text-gray-500">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>搜索教程（占位）</span>
        </div>
        <button
          id="refreshBtn"
          class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
          title="刷新（模拟）"
        >
          <i class="fa-solid fa-rotate-right"></i>
        </button>
        <button
          id="stateBtn"
          class="h-10 w-10 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
          title="状态（原型）"
        >
          <i class="fa-solid fa-sliders"></i>
        </button>
      </div>
    </nav>

    <!-- 顶部主题筛选 -->
    <div class="px-6 md:px-10 py-3 bg-white/95 border-b border-gray-200">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-2 text-xs text-gray-500">
          <span id="stageLabel">当前阶段：入门</span>
          <span class="opacity-60">·</span>
          <span id="filterLabel">全部主题</span>
        </div>
        <div class="flex items-center gap-2 text-xs text-gray-500 flex-wrap">
          <span class="hidden md:inline">主题筛选：</span>
          <button data-topic="" class="topicChip rounded-2xl px-3 py-1 border border-transparent bg-gray-100/0">
            全部
          </button>
          <button data-topic="tools" class="topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50">
            工具
          </button>
          <button data-topic="ai" class="topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50">
            AI 协作
          </button>
          <button data-topic="content" class="topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50">
            内容创作
          </button>
          <button data-topic="onebiz" class="topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50">
            一人公司
          </button>
          <button data-topic="compliance" class="topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50">
            政策与合规
          </button>
        </div>
      </div>
    </div>

    <!-- 主体内容 -->
    <main class="flex-1 overflow-hidden bg-gray-50">
      <div class="h-full grid grid-cols-12 gap-6 px-6 md:px-10 py-6">
        <!-- 主列表 -->
        <section class="col-span-12 lg:col-span-8 h-full overflow-hidden flex flex-col">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm text-gray-500">结构化教程 · 阶段 + 主题</div>
              <h2 id="headline" class="mt-1 text-xl font-semibold tracking-tight text-gray-900">
                入门阶段 · 推荐教程
              </h2>
            </div>
            <div class="hidden md:flex items-center gap-2 text-sm text-gray-500">
              <span class="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 border border-gray-200">
                <i class="fa-solid fa-list-ul text-xs"></i>
                <span id="countHint">36 篇（Mock）</span>
              </span>
            </div>
          </div>

          <div class="mt-4 flex-1 overflow-y-auto no-scrollbar pr-1 md:pr-2">
            <div id="listContainer" class="space-y-4"></div>
            <div id="loadMoreWrap" class="mt-6">
              <button
                id="loadMoreBtn"
                class="w-full rounded-2xl bg-gray-900 text-white py-3 font-semibold hover:bg-black active:bg-black transition"
              >
                加载更多
              </button>
              <div class="mt-2 text-center text-xs text-gray-500">每次加载 9 条（Mock）</div>
            </div>
            <div class="h-3"></div>
          </div>
        </section>

        <!-- 侧栏 -->
        <aside class="hidden lg:flex col-span-4 h-full overflow-hidden flex-col">
          <div class="rounded-3xl bg-white border border-gray-200 p-5">
            <div class="flex items-center justify-between">
              <div class="font-semibold text-gray-900">模块说明</div>
              <i class="fa-solid fa-circle-info text-sky-600"></i>
            </div>
            <div class="mt-2 text-sm leading-7 text-gray-600">
              「如何成为超级个体」模块通过阶段 + 主题结构组织教程内容：先确定你处在哪个阶段，再按主题缩小范围，快速决定下一步该学什么、做什么。
            </div>
          </div>

          <div class="mt-5 rounded-3xl bg-white border border-gray-200 p-5 flex-1 overflow-hidden flex flex-col">
            <div class="flex items-center justify-between">
              <div class="font-semibold text-gray-900">阶段进度（Mock）</div>
              <span class="text-xs text-gray-500">示意用</span>
            </div>
            <div class="mt-4 space-y-4">
              <div>
                <div class="flex items-center justify-between text-xs text-gray-500">
                  <span>入门</span>
                  <span>3/3</span>
                </div>
                <div class="mt-1 h-2 rounded-full bg-gray-100 overflow-hidden">
                  <div class="h-full w-full rounded-full bg-emerald-500"></div>
                </div>
              </div>
              <div>
                <div class="flex items-center justify-between text-xs text-gray-500">
                  <span>进阶</span>
                  <span>2/3</span>
                </div>
                <div class="mt-1 h-2 rounded-full bg-gray-100 overflow-hidden">
                  <div class="h-full w-2/3 rounded-full bg-sky-500"></div>
                </div>
              </div>
              <div>
                <div class="flex items-center justify-between text-xs text-gray-500">
                  <span>变现</span>
                  <span>1/3</span>
                </div>
                <div class="mt-1 h-2 rounded-full bg-gray-100 overflow-hidden">
                  <div class="h-full w-1/3 rounded-full bg-amber-500"></div>
                </div>
              </div>
            </div>
            <div class="mt-5 text-xs text-gray-500">
              与新闻模块联动时，可以在此补「本周案例」「相关新闻」等入口，形成从教程到实践案例的闭环。
            </div>
          </div>
        </aside>
      </div>
    </main>

    <!-- Toast -->
    <div
      id="toast"
      class="pointer-events-none opacity-0 transition fixed left-1/2 -translate-x-1/2 top-6 rounded-full bg-gray-900 text-white text-xs px-4 py-2 shadow-xl"
    >
      已刷新
    </div>

    <!-- 状态切换弹层 -->
    <div id="stateModal" class="hidden fixed inset-0 bg-black/40">
      <div class="absolute left-1/2 top-24 -translate-x-1/2 w-full max-w-xl rounded-3xl bg-white shadow-2xl border border-gray-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <div class="font-semibold">切换列表状态（原型）</div>
          <button id="closeStateBtn" class="h-10 w-10 rounded-2xl hover:bg-gray-100 text-gray-600">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="p-6 grid grid-cols-1 sm:grid-cols-3 gap-3">
          <button data-mode="normal" class="modeBtn rounded-2xl border border-gray-200 px-4 py-4 text-left hover:bg-gray-50">
            <div class="font-medium">正常</div>
            <div class="text-xs text-gray-500 mt-1">展示教程列表 + 加载更多</div>
          </button>
          <button data-mode="empty" class="modeBtn rounded-2xl border border-gray-200 px-4 py-4 text-left hover:bg-gray-50">
            <div class="font-medium">空状态</div>
            <div class="text-xs text-gray-500 mt-1">模拟该阶段/主题暂无教程</div>
          </button>
          <button data-mode="error" class="modeBtn rounded-2xl border border-gray-200 px-4 py-4 text-left hover:bg-gray-50">
            <div class="font-medium">加载失败</div>
            <div class="text-xs text-gray-500 mt-1">模拟接口失败，可重试</div>
          </button>
        </div>
      </div>
    </div>

    <script>
      const stages = [
        { id: "intro", name: "入门" },
        { id: "advanced", name: "进阶" },
        { id: "monetize", name: "变现" },
      ];
      const topics = [
        { id: "tools", name: "工具" },
        { id: "ai", name: "AI 协作" },
        { id: "content", name: "内容创作" },
        { id: "onebiz", name: "一人公司" },
        { id: "compliance", name: "政策与合规" },
      ];

      function pad2(n) {
        return String(n).padStart(2, "0");
      }
      function formatTime(ts) {
        const d = new Date(ts);
        const now = new Date();
        const deltaMin = Math.max(0, Math.round((now - d) / 60000));
        if (deltaMin <= 2) return "刚刚";
        if (deltaMin < 60) return `${deltaMin} 分钟前`;
        return `${d.getMonth() + 1}月${d.getDate()}日 ${pad2(d.getHours())}:${pad2(
          d.getMinutes()
        )}`;
      }

      function genMockTutorials() {
        const baseSummaryIntro =
          "从角色、资源和能力三个维度，帮助你给自己一个清晰的定位，并用可执行的小实验开始对外输出。";
        const baseSummaryAdvanced =
          "当你有了最初的受众与内容，本阶段聚焦在搭建可持续的节奏和结构，并逐步引入协作与系统。";
        const baseSummaryMonetize =
          "围绕最小可行产品（MVP）、试销与迭代展开，让你在不压垮自己的前提下尝试变现路径。";

        const stageIds = ["intro", "advanced", "monetize"];
        const sourceTypes = ["self", "repost", "external"];
        const now = Date.now();
        const tutorials = [];
        let idCounter = 1;

        for (const stageId of stageIds) {
          for (let i = 0; i < 18; i++) {
            const title =
              stageId === "intro"
                ? `入门关键动作 ${i + 1}：建立第一个可见输出`
                : stageId === "advanced"
                ? `进阶实践 ${i + 1}：让输出与反馈形成闭环`
                : `变现实验 ${i + 1}：设计一份值得付费的方案`;

            const summary =
              stageId === "intro"
                ? baseSummaryIntro
                : stageId === "advanced"
                ? baseSummaryAdvanced
                : baseSummaryMonetize;

            const topicCount = 1 + (i % 2);
            const shuffled = [...topics].sort(() => Math.random() - 0.5);
            const topicIds = shuffled.slice(0, topicCount).map((t) => t.id);
            const sourceType = sourceTypes[i % sourceTypes.length];
            const isExternal = sourceType === "external";
            const publishTime = now - (idCounter * 37 + (stageId === "monetize" ? 17 : 9)) * 60 * 1000;

            tutorials.push({
              id: `tutorial-${idCounter}`,
              title,
              summary,
              stageId,
              topicIds,
              coverImage: `https://images.unsplash.com/photo-1556761175-4b46a572b786?w=1200&q=80&sig=${idCounter}`,
              sourceType,
              sourceLabel:
                sourceType === "self" ? "自产" : sourceType === "repost" ? "转载" : "外链",
              externalUrl: isExternal ? "https://www.indiehackers.com/" : "",
              publishTime,
            });

            idCounter++;
          }
        }
        return tutorials;
      }

      const tutorials = genMockTutorials();
      let currentStage = "intro";
      let currentTopic = "";
      let page = 1;
      let mode = "normal"; // normal | empty | error
      const PAGE_SIZE = 9;

      const els = {
        stageIntro: document.getElementById("stageIntro"),
        stageAdvanced: document.getElementById("stageAdvanced"),
        stageMonetize: document.getElementById("stageMonetize"),
        topicChips: document.querySelectorAll(".topicChip"),
        stageLabel: document.getElementById("stageLabel"),
        filterLabel: document.getElementById("filterLabel"),
        refreshBtn: document.getElementById("refreshBtn"),
        stateBtn: document.getElementById("stateBtn"),
        stateModal: document.getElementById("stateModal"),
        closeStateBtn: document.getElementById("closeStateBtn"),
        toast: document.getElementById("toast"),
        headline: document.getElementById("headline"),
        countHint: document.getElementById("countHint"),
        listContainer: document.getElementById("listContainer"),
        loadMoreWrap: document.getElementById("loadMoreWrap"),
        loadMoreBtn: document.getElementById("loadMoreBtn"),
      };

      function showToast(text) {
        els.toast.textContent = text;
        els.toast.classList.remove("opacity-0");
        els.toast.classList.add("opacity-100");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => {
          els.toast.classList.add("opacity-0");
          els.toast.classList.remove("opacity-100");
        }, 900);
      }

      function setStageUI() {
        function cls(buttonStageId) {
          const active =
            "flex items-center gap-2 text-sm font-medium text-gray-900";
          const inactive =
            "flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800";
          return currentStage === buttonStageId ? active : inactive;
        }
        els.stageIntro.className = cls("intro");
        els.stageAdvanced.className = cls("advanced");
        els.stageMonetize.className = cls("monetize");

        const meta = stages.find((s) => s.id === currentStage);
        els.stageLabel.textContent = `当前阶段：${meta ? meta.name : ""}`;
      }

      function setTopicUI() {
        els.topicChips.forEach((chip) => {
          const v = chip.getAttribute("data-topic") || "";
          const name = topics.find((t) => t.id === v)?.name;
          if (v === currentTopic) {
            chip.className =
              "topicChip rounded-2xl px-3 py-1 border border-sky-500 bg-sky-50 text-xs text-sky-800";
            els.filterLabel.textContent = v ? `主题：${name}` : "全部主题";
          } else if (!v) {
            chip.className =
              "topicChip rounded-2xl px-3 py-1 border border-transparent bg-gray-100/0 text-xs text-gray-400";
          } else {
            chip.className =
              "topicChip rounded-2xl px-3 py-1 border border-gray-200 bg-gray-50 text-xs text-gray-700";
          }
        });
      }

      function truncate(s, n) {
        if (!s) return "";
        return s.length > n ? s.slice(0, n) + "…" : s;
      }

      function renderRow(item) {
        const stageName = stages.find((s) => s.id === item.stageId)?.name || "";
        const topicLabels = topics
          .filter((t) => item.topicIds.includes(t.id))
          .map((t) => t.name);
        const chips = topicLabels
          .map(
            (name) =>
              `<span class="inline-flex items-center rounded-full bg-gray-100 px-2.5 py-1 text-[11px] text-gray-600">${name}</span>`
          )
          .join("");
        const sourceColor =
          item.sourceType === "self"
            ? "bg-emerald-50 text-emerald-700 border-emerald-200"
            : item.sourceType === "repost"
            ? "bg-amber-50 text-amber-700 border-amber-200"
            : "bg-indigo-50 text-indigo-700 border-indigo-200";

        return `
          <article class="rounded-3xl border border-gray-200 bg-white overflow-hidden hover:shadow-[0_20px_60px_rgba(15,23,42,0.10)] transition">
            <button data-id="${item.id}" class="w-full text-left">
              <div class="grid grid-cols-12 gap-0">
                <div class="col-span-4 relative h-[170px]">
                  <img src="${item.coverImage}" alt="" class="h-full w-full object-cover" />
                  <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-black/15 to-transparent"></div>
                  <div class="absolute left-4 right-4 bottom-3 flex items-center justify-between gap-3">
                    <span class="inline-flex items-center gap-2 rounded-full bg-white/15 px-3 py-1 text-xs text白色 backdrop-blur">
                      <i class="fa-solid fa-graduation-cap text-[11px]"></i>
                      <span>${stageName}</span>
                    </span>
                    <span class="text-xs text-white/80">${formatTime(item.publishTime)}</span>
                  </div>
                </div>
                <div class="col-span-8 p-5">
                  <h3 class="text-[18px] leading-7 font-semibold text-gray-900">
                    ${item.title}
                  </h3>
                  <p class="mt-2 text-sm leading-7 text-gray-600">
                    ${truncate(item.summary, 150)}
                  </p>
                  <div class="mt-4 flex items-center justify-between text-xs text-gray-500 gap-3">
                    <div class="flex flex-wrap gap-1">
                      ${chips}
                    </div>
                    <span class="inline-flex items-center gap-1 rounded-full border ${sourceColor} px-2.5 py-1 text-[10px]">
                      <span>${item.sourceLabel}</span>
                    </span>
                  </div>
                  <div class="mt-2 flex items-center justify-end text-xs text-indigo-600">
                    <span class="inline-flex items-center gap-1">
                      <span>查看详情</span>
                      <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </span>
                  </div>
                </div>
              </div>
            </button>
          </article>
        `;
      }

      function filterTutorials() {
        return tutorials.filter((t) => {
          if (t.stageId !== currentStage) return false;
          if (currentTopic && !t.topicIds.includes(currentTopic)) return false;
          return true;
        });
      }

      function renderEmpty() {
        els.listContainer.innerHTML = `
          <div class="rounded-3xl border border-dashed border-gray-300 bg-white px-6 py-12 text-center">
            <div class="mx-auto h-14 w-14 rounded-3xl bg-gray-100 flex items-center justify-center text-gray-500">
              <i class="fa-regular fa-face-meh text-2xl"></i>
            </div>
            <div class="mt-4 text-lg font-semibold text-gray-900">该阶段/主题下暂无教程</div>
            <div class="mt-1 text-sm text-gray-500">你可以切换阶段或点击刷新重试。</div>
            <button id="emptyRetryBtn" class="mt-5 inline-flex items-center gap-2 rounded-2xl bg-gray-900 px-5 py-3 text-sm font-semibold text-white">
              <i class="fa-solid fa-rotate-right"></i>
              <span>刷新</span>
            </button>
          </div>
        `;
        els.loadMoreWrap.classList.add("hidden");
        document.getElementById("emptyRetryBtn").addEventListener("click", () => {
          mode = "normal";
          refresh();
        });
      }

      function renderError() {
        els.listContainer.innerHTML = `
          <div class="rounded-3xl border border-rose-200 bg-rose-50 px-6 py-10">
            <div class="flex items-start gap-4">
              <div class="h-14 w-14 rounded-3xl bg-rose-200/60 text-rose-700 flex items-center justify-center">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
              </div>
              <div class="flex-1">
                <div class="text-lg font-semibold text-rose-900">加载失败，请刷新重试</div>
                <div class="mt-1 text-sm leading-7 text-rose-800/80">
                  原型演示：当教程列表接口失败时，展示错误状态与重试入口。
                </div>
                <button id="errorRetryBtn" class="mt-5 inline-flex items-center gap-2 rounded-2xl bg-rose-600 px-5 py-3 text-sm font-semibold text-white hover:bg-rose-700">
                  <i class="fa-solid fa-rotate-right"></i>
                  <span>重试</span>
                </button>
              </div>
            </div>
          </div>
        `;
        els.loadMoreWrap.classList.add("hidden");
        document.getElementById("errorRetryBtn").addEventListener("click", () => {
          mode = "normal";
          refresh();
        });
      }

      function renderList() {
        setStageUI();
        setTopicUI();

        els.headline.textContent =
          currentStage === "intro"
            ? "入门阶段 · 推荐教程"
            : currentStage === "advanced"
            ? "进阶阶段 · 推荐教程"
            : "变现阶段 · 推荐教程";

        if (mode === "empty") return renderEmpty();
        if (mode === "error") return renderError();

        const list = filterTutorials();
        const slice = list.slice(0, page * PAGE_SIZE);
        els.listContainer.innerHTML = slice.map(renderRow).join("");

        els.listContainer.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            const params = new URLSearchParams({
              id,
              stage: currentStage,
              topic: currentTopic,
            });
            window.location.href = `./detail.html?${params.toString()}`;
          });
        });

        els.countHint.textContent = `${list.length} 篇（Mock）`;
        const hasMore = list.length > slice.length;
        if (!hasMore) {
          els.loadMoreBtn.disabled = true;
          els.loadMoreBtn.textContent = "没有更多了";
          els.loadMoreBtn.className =
            "w-full rounded-2xl bg-gray-200 text-gray-500 py-3 font-semibold";
        } else {
          els.loadMoreBtn.disabled = false;
          els.loadMoreBtn.textContent = "加载更多";
          els.loadMoreBtn.className =
            "w-full rounded-2xl bg-gray-900 text-white py-3 font-semibold hover:bg-black active:bg-black transition";
        }
        els.loadMoreWrap.classList.remove("hidden");
      }

      function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function refresh() {
        page = 1;
        shuffleInPlace(tutorials);
        renderList();
        showToast("已刷新（Mock）");
      }

      function switchStage(nextStage) {
        if (currentStage === nextStage) return;
        currentStage = nextStage;
        page = 1;
        mode = "normal";
        renderList();
      }

      function switchTopic(nextTopic) {
        if (currentTopic === nextTopic) return;
        currentTopic = nextTopic;
        page = 1;
        mode = "normal";
        renderList();
      }

      function openStateModal() {
        els.stateModal.classList.remove("hidden");
      }
      function closeStateModal() {
        els.stateModal.classList.add("hidden");
      }

      function initFromUrl() {
        const u = new URL(window.location.href);
        const s = u.searchParams.get("stage");
        const t = u.searchParams.get("topic");
        if (s && stages.some((x) => x.id === s)) currentStage = s;
        if (t && topics.some((x) => x.id === t)) currentTopic = t;
      }

      // events
      els.stageIntro.addEventListener("click", () => switchStage("intro"));
      els.stageAdvanced.addEventListener("click", () => switchStage("advanced"));
      els.stageMonetize.addEventListener("click", () => switchStage("monetize"));

      els.topicChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          const v = chip.getAttribute("data-topic") || "";
          switchTopic(v);
        });
      });

      els.loadMoreBtn.addEventListener("click", () => {
        if (mode !== "normal") return;
        page += 1;
        renderList();
      });

      els.refreshBtn.addEventListener("click", () => {
        if (mode === "error" || mode === "empty") mode = "normal";
        refresh();
      });

      els.stateBtn.addEventListener("click", openStateModal);
      els.closeStateBtn.addEventListener("click", closeStateModal);
      els.stateModal.addEventListener("click", (e) => {
        if (e.target === els.stateModal) closeStateModal();
      });
      document.querySelectorAll(".modeBtn").forEach((btn) => {
        btn.addEventListener("click", () => {
          mode = btn.getAttribute("data-mode") || "normal";
          closeStateModal();
          renderList();
          showToast(mode === "normal" ? "正常" : mode === "empty" ? "空状态" : "加载失败");
        });
      });

      // init
      initFromUrl();
      renderList();
    </script>
  </body>
</html>
