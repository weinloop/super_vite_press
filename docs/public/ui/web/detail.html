<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web｜新闻详情（Mock）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black text-gray-900 flex flex-col">
    <!-- Web 伪浏览器栏（页面级） -->
    <header class="flex items-center gap-3 px-4 py-2 bg-gray-100 border-b">
      <div class="flex gap-1">
        <span class="w-3 h-3 rounded-full bg-red-500"></span>
        <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
        <span class="w-3 h-3 rounded-full bg-green-500"></span>
      </div>
      <span class="text-gray-500 text-sm">https://superoneman.local/news/detail</span>
      <div class="ml-auto flex items-center gap-2 text-gray-500 text-sm">
        <i class="fa-solid fa-lock"></i>
        <span class="hidden lg:inline">Mock Prototype</span>
      </div>
    </header>

    <div class="flex-1 flex flex-col">
          <!-- 顶部导航 -->
          <nav class="flex items-center justify-between px-10 py-5 bg-white border-b">
            <div class="flex items-center gap-4">
              <button
                id="backBtn"
                class="h-11 w-11 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
                title="返回"
              >
                <i class="fa-solid fa-arrow-left"></i>
              </button>
              <div>
                <div class="text-xs text-gray-500">新闻详情</div>
                <div class="text-lg font-semibold tracking-tight text-gray-900">超级个体新闻（Mock）</div>
              </div>
            </div>

            <div class="flex items-center gap-3">
              <a href="../index.html" class="text-sm text-gray-500 hover:text-gray-700">返回入口</a>
              <button
                id="copyBtn"
                class="h-11 w-11 rounded-2xl bg-gray-100 hover:bg-gray-200 active:bg-gray-200 text-gray-700"
                title="复制（Mock）"
              >
                <i class="fa-regular fa-copy"></i>
              </button>
            </div>
          </nav>

          <!-- 内容区 -->
          <div class="flex-1 overflow-hidden bg-gray-50">
            <div class="h-full grid grid-cols-12 gap-6 px-10 py-6">
              <!-- 主内容 -->
              <main class="col-span-8 h-full overflow-y-auto no-scrollbar pr-2">
                <div class="rounded-3xl border border-gray-200 bg-white overflow-hidden">
                  <div class="relative h-[360px] bg-gray-200">
                    <img id="heroImg" alt="" class="h-full w-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/25 to-transparent"></div>
                    <div class="absolute left-6 right-6 bottom-5 flex items-center justify-between">
                      <div class="inline-flex items-center gap-2 rounded-full bg-white/15 px-4 py-2 text-xs text-white backdrop-blur">
                        <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
                        <span id="categoryLabel">个体新闻</span>
                      </div>
                      <div class="text-xs text-white/80">仅展示摘要与来源（合规）</div>
                    </div>
                  </div>

                  <div class="p-8">
                    <h1 id="title" class="text-2xl font-semibold tracking-tight text-gray-900 leading-9">
                      —
                    </h1>
                    <div class="mt-4 flex flex-wrap items-center gap-2 text-sm text-gray-600">
                      <span class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-4 py-2">
                        <i class="fa-regular fa-building"></i>
                        <span id="sourceName">—</span>
                      </span>
                      <span class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-4 py-2">
                        <i class="fa-regular fa-clock"></i>
                        <span id="publishTime">—</span>
                      </span>
                    </div>

                    <div class="mt-8 grid gap-4">
                      <div class="rounded-3xl border border-gray-200 bg-gray-50 p-6">
                        <div class="flex items-center justify-between">
                          <div class="font-semibold text-gray-900">摘要（Mock）</div>
                          <div class="text-xs text-gray-500">可扩展：AI 摘要（P2）</div>
                        </div>
                        <p id="summary" class="mt-4 text-sm leading-7 text-gray-700">—</p>
                      </div>

                      <div class="rounded-3xl border border-indigo-100 bg-indigo-50/70 p-6">
                        <div class="flex items-start gap-4">
                          <div class="h-12 w-12 rounded-3xl bg-indigo-200/60 text-indigo-700 flex items-center justify-center">
                            <i class="fa-solid fa-shield-halved"></i>
                          </div>
                          <div class="flex-1">
                            <div class="font-semibold text-indigo-900">合规说明</div>
                            <div class="mt-2 text-sm leading-7 text-indigo-900/80">
                              本页面仅展示标题、摘要与来源信息；点击“打开原文”将跳转至第三方站点查看完整内容。版权归原作者与来源站点所有。
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </main>

              <!-- 侧栏 -->
              <aside class="col-span-4 h-full overflow-hidden flex flex-col gap-5">
                <div class="rounded-3xl bg-white border border-gray-200 p-6">
                  <div class="flex items-center justify-between">
                    <div class="font-semibold text-gray-900">原文</div>
                    <i class="fa-solid fa-arrow-up-right-from-square text-gray-500"></i>
                  </div>
                  <div id="sourceHint" class="mt-2 text-sm leading-7 text-gray-600">
                    将在新窗口打开外链
                  </div>
                  <button
                    id="openSourceBtn"
                    class="mt-5 w-full rounded-2xl bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-700 text-white font-semibold py-3"
                  >
                    打开原文
                  </button>
                </div>

                <div class="rounded-3xl bg-white border border-gray-200 p-6 flex-1 overflow-hidden">
                  <div class="flex items-center justify-between">
                    <div class="font-semibold text-gray-900">你可能也想看（Mock）</div>
                    <span class="text-xs text-gray-500">同分类</span>
                  </div>
                  <div id="recList" class="mt-4 space-y-3 overflow-y-auto no-scrollbar pr-1"></div>
                </div>
              </aside>
            </div>
          </div>

          <!-- Toast -->
          <div
            id="toast"
            class="pointer-events-none opacity-0 transition fixed left-1/2 -translate-x-1/2 top-6 rounded-full bg-gray-900 text-white text-xs px-4 py-2 shadow-xl"
          >
            已复制
          </div>
        </div>
      </div>

    <script>
      const covers = [
        "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1400&q=80",
        "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1400&q=80",
        "https://images.unsplash.com/photo-1557683316-973673baf926?w=1600&q=80",
        "https://images.unsplash.com/photo-1518779578993-ec3579fee39f?w=1600&q=80",
        "https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1600&q=80",
        "https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1600&q=80",
        "https://images.unsplash.com/photo-1554774853-b414d539f13d?w=1600&q=80",
        "https://images.unsplash.com/photo-1556761175-4b46a572b786?w=1600&q=80",
      ];

      function pad2(n) {
        return String(n).padStart(2, "0");
      }
      function formatTime(ts) {
        const d = new Date(ts);
        return `${d.getMonth() + 1}月${d.getDate()}日 ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function genMockNews(category) {
        const baseSources =
          category === "ai"
            ? [
                { name: "OpenAI Blog", url: "https://openai.com/blog" },
                { name: "Google AI", url: "https://ai.google/" },
                { name: "Hugging Face", url: "https://huggingface.co/blog" },
                { name: "The Verge", url: "https://www.theverge.com/ai-artificial-intelligence" },
                { name: "MIT Tech Review", url: "https://www.technologyreview.com/" },
              ]
            : [
                { name: "Indie Hackers", url: "https://www.indiehackers.com/" },
                { name: "Product Hunt", url: "https://www.producthunt.com/" },
                { name: "Hacker News", url: "https://news.ycombinator.com/" },
                { name: "Lenny’s Newsletter", url: "https://www.lennysnewsletter.com/" },
                { name: "Stripe", url: "https://stripe.com/" },
              ];

        const titleSeeds =
          category === "ai"
            ? [
                "多模态模型如何改变个人工作流",
                "开源推理加速：把延迟从 2s 降到 400ms",
                "AI 产品增长：从体验到留存的 7 个关键点",
                "政策更新：AI 合规与数据治理的最新动向",
                "工具链升级：把提示工程变成可复用资产",
              ]
            : [
                "独立开发者如何在 30 天做出可售卖产品",
                "从 0 到 1：个人品牌与内容分发的组合拳",
                "小团队增长：把用户反馈变成迭代节奏",
                "副业转正：如何找到第一个稳定的付费用户",
                "产品冷启动：用最小闭环验证需求",
              ];

        const summarySeeds =
          category === "ai"
            ? [
                "围绕“可落地”的使用场景展开，强调可观察指标与迭代回路，避免只堆模型能力。并给出从评测到上线监控的关键检查点。",
                "从数据、评测、推理到上线监控给出全链路要点，并补充常见坑位与规避方案。适合想把 AI 真正用起来的独立团队。",
                "以真实团队案例拆解：需求澄清、产研协作、以及把模型融入体验的关键触点，并讨论合规与风险边界。",
              ]
            : [
                "从市场与用户心智入手，强调先卖后做与快速验证，减少无效开发。给出可执行的分发与定价策略参考。",
                "拆解获客渠道、定价与交付方式，给出可复用的执行清单与节奏建议，让个人在有限时间里稳定推进。",
                "聚焦最小可行闭环：问题-方案-验证-复购，帮助个人保持长期迭代，并将反馈纳入每周节奏。",
              ];

        const now = Date.now();
        const items = [];
        for (let i = 0; i < 60; i++) {
          const source = baseSources[i % baseSources.length];
          const title = titleSeeds[i % titleSeeds.length] + `（第 ${i + 1} 条）`;
          const summary = summarySeeds[i % summarySeeds.length];
          const publishTime = now - (i * 31 + (category === "ai" ? 13 : 5)) * 60 * 1000;
          const id = `${category}-${i + 1}`;
          items.push({
            id,
            category,
            title,
            summary,
            sourceName: source.name,
            sourceUrl: source.url,
            publishTime,
            coverUrl: covers[i % covers.length],
          });
        }
        return items;
      }

      const dataset = {
        individual: genMockNews("individual"),
        ai: genMockNews("ai"),
      };

      const els = {
        webDevice: document.getElementById("webDevice"),
        backBtn: document.getElementById("backBtn"),
        copyBtn: document.getElementById("copyBtn"),
        toast: document.getElementById("toast"),
        heroImg: document.getElementById("heroImg"),
        categoryLabel: document.getElementById("categoryLabel"),
        title: document.getElementById("title"),
        sourceName: document.getElementById("sourceName"),
        publishTime: document.getElementById("publishTime"),
        summary: document.getElementById("summary"),
        sourceHint: document.getElementById("sourceHint"),
        openSourceBtn: document.getElementById("openSourceBtn"),
        recList: document.getElementById("recList"),
      };

      function showToast(text) {
        els.toast.textContent = text;
        els.toast.classList.remove("opacity-0");
        els.toast.classList.add("opacity-100");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => {
          els.toast.classList.add("opacity-0");
          els.toast.classList.remove("opacity-100");
        }, 900);
      }

      function renderRec(item, category) {
        return `
          <button data-id="${item.id}" class="w-full text-left rounded-2xl border border-gray-200 p-4 hover:bg-gray-50 transition">
            <div class="text-sm font-medium text-gray-900 leading-6">${item.title}</div>
            <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
              <span>${item.sourceName}</span>
              <span class="text-indigo-600">查看</span>
            </div>
          </button>
        `;
      }

      function init() {
        const u = new URL(window.location.href);
        const id = u.searchParams.get("id") || "individual-1";
        const category = u.searchParams.get("category") === "ai" ? "ai" : "individual";
        const item = dataset[category].find((x) => x.id === id) || dataset[category][0];

        els.categoryLabel.textContent = category === "ai" ? "AI 新闻" : "个体新闻";
        els.heroImg.src = item.coverUrl;
        els.title.textContent = item.title;
        els.sourceName.textContent = item.sourceName;
        els.publishTime.textContent = formatTime(item.publishTime);
        els.summary.textContent = item.summary;
        els.sourceHint.textContent = `来源：${item.sourceName} · 将在新窗口打开外链`;

        const rec = dataset[category].filter((x) => x.id !== item.id).slice(0, 8);
        els.recList.innerHTML = rec.map((x) => renderRec(x, category)).join("");
        els.recList.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const nextId = btn.getAttribute("data-id");
            window.location.href = `./detail.html?id=${encodeURIComponent(nextId)}&category=${encodeURIComponent(category)}`;
          });
        });

        els.backBtn.addEventListener("click", () => {
          window.location.href = `./desktop.html?category=${encodeURIComponent(category)}`;
        });

        els.openSourceBtn.addEventListener("click", () => {
          window.open(item.sourceUrl, "_blank", "noopener,noreferrer");
        });

        els.copyBtn.addEventListener("click", async () => {
          const text = `${item.title}（来源：${item.sourceName}）`;
          try {
            if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
            showToast("已复制（Mock）");
          } catch {
            showToast("复制失败（Mock）");
          }
        });
      }

      init();
    </script>
  </body>
</html>
